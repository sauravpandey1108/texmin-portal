<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEXMiN Foundation — Outreach CoE Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Brand Colors */
  --primary:        #0B3D91;
  --primary-dark:   #082c6c;
  --primary-light:  rgba(11,61,145,0.08);
  --secondary:      #F7931E;
  --secondary-dark: #e07d0a;
  --secondary-light:rgba(247,147,30,0.12);

  /* Backgrounds */
  --bg-main:   #F0F4FA;
  --bg-deep:   #E4EAF5;
  --bg-card:   #FFFFFF;
  --bg-raised: #EFF3FA;

  /* Text */
  --text-primary:   #0D1B2A;
  --text-secondary: #2E4057;
  --text-tertiary:  #5A6F88;

  /* Borders */
  --border:        #C8D5E8;
  --border-strong: #A0B4CC;

  /* Semantic */
  --success:        #16A34A;
  --success-bg:     #DCFCE7;
  --success-border: #86EFAC;
  --success-text:   #166534;
  --danger:         #DC2626;
  --danger-bg:      #FEE2E2;
  --danger-border:  #FCA5A5;
  --warn-bg:        #FEF9C3;
  --warn-border:    #FDE047;
  --warn-text:      #854D0E;
  --info-bg:        #DBEAFE;
  --info-border:    #93C5FD;
  --info-text:      #1D4ED8;

  /* Spacing scale */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;

  /* Radius */
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 12px;

  /* Typography — single system font stack */
  --font-body:    'Nunito Sans', system-ui, sans-serif;
  --font-heading: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;

  /* Shadows — subtle, not dramatic */
  --shadow-sm:  0 1px 4px rgba(11,61,145,0.07);
  --shadow-md:  0 2px 10px rgba(11,61,145,0.10);
  --shadow-lg:  0 4px 20px rgba(11,61,145,0.14);
}

/* ── 2. BASE & TYPOGRAPHY ── */
html, body {
  max-width: 100vw;
  overflow-x: hidden;
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-main);
  font-weight: 400;
}

/* Heading hierarchy — clear scale, not all-caps everywhere */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 700;
  color: var(--primary);
  line-height: 1.3;
}
h1 { font-size: 24px; }
h2 { font-size: 20px; }
h3 { font-size: 17px; }
h4 { font-size: 14px; }
h5, h6 { font-size: 13px; }

/* Labels — readable, not all-caps */
label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  display: block;
  margin-bottom: var(--space-xs);
}

/* Utility */
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

/* ── 3. SCROLLBAR — native-style, minimal ── */
::-webkit-scrollbar       { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ── 4. LOGIN PAGE ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-main);
  width: 100%;
}

.login-inner {
  width: 100%;
  max-width: 420px;
  margin: auto;
  padding: var(--space-lg) var(--space-md);
}

.brand-strip {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.brand-icon {
  width: 220px;
  height: auto;
  background: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-icon img { width: 100%; height: auto; display: block; }

.brand-name {
  font-family: var(--font-heading);
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}

.brand-sub {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: 4px solid var(--primary);
  border-radius: var(--radius-lg);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-md);
  width: 100%;
}

.login-card h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: var(--space-lg);
}

.login-card .sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-lg);
}

.field-group { margin-bottom: var(--space-md); }

.field-group label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
  margin-bottom: var(--space-xs);
}

.field-group input,
.field-group select {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-primary);
  background: var(--bg-card);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}

.field-group input::placeholder { color: var(--text-tertiary); }

.field-group input:focus,
.field-group select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 50px; }

.pw-toggle {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 600;
  padding: 3px 6px;
  font-family: var(--font-body);
  border-radius: 4px;
  transition: color 0.15s;
}

.pw-toggle:hover { color: var(--primary); }

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--primary);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-heading);
  transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  box-shadow: var(--shadow-md);
}

.btn-login:hover {
  background: var(--primary-dark);
  box-shadow: var(--shadow-lg);
  transform: translateY(-1px);
}

.btn-login:active { transform: translateY(0); }

.login-err {
  font-size: 13px;
  color: var(--danger);
  margin-bottom: var(--space-md);
  padding: 9px 12px;
  background: var(--danger-bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--danger-border);
  display: none;
}

/* ── 5. APP CHROME ── */
#app {
  display: none;
  min-height: 100vh;
  width: 100%;
  background: var(--bg-main);
}

/* ── 6. TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.5rem;
  background: var(--primary);
  border-bottom: 3px solid var(--secondary);
  box-shadow: var(--shadow-md);
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.topbar-left { display: flex; align-items: center; gap: 10px; }

.tb-icon{
    width:42px;
    height:42px;
    background:#ffffff;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-right:12px;
}

.tb-icon img{
    width:30px;
    height:30px;
    object-fit:contain;
}

.tb-title {
  font-family: var(--font-heading);
  font-size: 16px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0.3px;
}

.badge-admin {
  background: rgba(247,147,30,0.2);
  color: var(--secondary);
  border: 1px solid rgba(247,147,30,0.5);
}

.badge-coe {
  background: rgba(255,255,255,0.15);
  color: #FFFFFF;
  border: 1px solid rgba(255,255,255,0.3);
}

.tb-right { display: flex; align-items: center; gap: var(--space-sm); }

.tb-user {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
}

/* ── 7. BUTTONS ── */
.btn-sm {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.1);
  color: #FFFFFF;
  font-family: var(--font-body);
}

.btn-sm:hover {
  background: rgba(255,255,255,0.2);
  border-color: #FFFFFF;
  color: #FFFFFF;
}

/* btn-sm outside topbar */
.content .btn-sm,
.modal-box .btn-sm,
.ftable .btn-sm {
  color: var(--primary);
  border-color: var(--primary);
  background: #FFFFFF;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  min-width: 52px;
  line-height: 1;
}

.content .btn-sm:hover,
.ftable .btn-sm:hover { background: var(--primary); color: #FFFFFF; }

.btn-add {
  font-size: 13px;
  font-weight: 700;
  color: #FFFFFF;
  background: var(--secondary);
  border: none;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  font-family: var(--font-heading);
  box-shadow: 0 2px 8px var(--secondary-light);
}

.btn-add:hover { background: var(--secondary-dark); }

.btn-save {
  font-size: 13px;
  font-weight: 700;
  padding: 9px 22px;
  background: var(--secondary);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-heading);
  transition: background 0.15s, box-shadow 0.15s;
}

.btn-save:hover { background: var(--secondary-dark); }

.btn-cancel {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  background: transparent;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}

.btn-cancel:hover { background: var(--bg-raised); color: var(--primary); }

/* ── 8. NAV BAR ── */
.nav-bar {
  display: flex;
  background: var(--bg-card);
  border-bottom: 2px solid var(--border);
  padding: 0 1.5rem;
  overflow-x: auto;
  flex-wrap: wrap;
}

.nav-tab {
  font-size: 13px;
  font-weight: 600;
  padding: 12px 18px;
  border-radius: 0;
  cursor: pointer;
  color: var(--text-secondary);
  border: none;
  border-bottom: 3px solid transparent;
  background: transparent;
  white-space: nowrap;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  font-family: var(--font-body);
  letter-spacing: 0.2px;
}

.nav-tab.active {
  color: var(--primary);
  border-bottom-color: var(--secondary);
  background: var(--primary-light);
}

.nav-tab:hover:not(.active) {
  color: var(--primary);
  background: rgba(11,61,145,0.04);
}

/* ── 9. CONTENT ── */
.content {
  padding: 1.5rem;
  background: var(--bg-main);
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

/* ── 10. METRIC CARDS ── */
.cards-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.mc {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.mc:hover { box-shadow: var(--shadow-md); }

.mc-accent { border-left: 4px solid var(--secondary); }

.mc-label {
  font-size: 11px;
  font-weight: 600;
  margin-bottom:8px;
  color: var(--text-secondary);
  margin-bottom: var(--space-sm);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.mc-val {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.1;
  font-family: var(--font-heading);
}

.mc-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: var(--space-xs);
}

/* ── 11. SECTION HEADER ── */
.sec-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-md);
}

.sec-head-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.3px;
}

/* ── 12. SECTION CARD ── */
.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-lg);
  box-shadow: var(--shadow-sm);
}

/* ── 13. TABLES (responsive) ── */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

.ftable {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: fixed;
}

.ftable th {
  text-align: left;
  font-weight: 700;
  font-size: 11px;
  color: var(--primary);
  padding: 11px 12px;
  border-bottom: 2px solid var(--border);
  background: var(--bg-raised);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-family: var(--font-body);
}

.ftable td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bg-deep);
  color: var(--text-primary);
  vertical-align: middle;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}

.ftable tr:last-child td { border-bottom: none; }
.ftable tr:hover td { background: var(--bg-raised); }

/* Action column */
.ftable td:last-child {
  overflow: visible;
  white-space: nowrap;
  width: 70px;
  min-width: 70px;
  padding: 6px 10px;
  text-align: center;
  vertical-align: middle;
}

/* Status column */
.ftable td:nth-last-child(2) {
  overflow: visible;
  white-space: nowrap;
  min-width: 80px;
  padding: 6px 10px;
  text-align: center;
  vertical-align: middle;
}

/* ── 14. STATUS PILLS ── */
.pill {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 4px;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
}

.p-active   { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.p-pending  { background: var(--warn-bg);    color: var(--warn-text);    border: 1px solid var(--warn-border); }
.p-done     { background: var(--info-bg);    color: var(--info-text);    border: 1px solid var(--info-border); }
.p-inactive { background: #F1F5F9;           color: #64748B;             border: 1px solid #CBD5E1; }

/* ── 15. PROGRESS ── */
.prog-wrap {
  background: var(--bg-deep);
  border-radius: 4px;
  height: 6px;
  width: 100%;
  overflow: hidden;
}

.prog-bar {
  height: 6px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  transition: width 0.4s;
}

.prog-wrap.slim { height: 4px; }
.prog-bar.slim  { height: 4px; border-radius: 3px; }

/* ── 16. COE GRID ── */
.coe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.coe-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-md);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  box-shadow: var(--shadow-sm);
}

.coe-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.coe-card h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: var(--space-sm);
  line-height: 1.4;
  white-space: normal;
}

.coe-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  align-items: flex-start;
}

.coe-row span:first-child { flex-shrink: 0; white-space: nowrap; }
.coe-row span:last-child  { font-weight: 600; color: var(--text-primary); text-align: right; word-break: break-word; max-width: 55%; }

.coe-tier {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 3px;
  margin-bottom: var(--space-sm);
  display: inline-block;
  font-weight: 700;
}

.tier-a { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.tier-b { background: var(--info-bg);    color: var(--info-text);    border: 1px solid var(--info-border); }
.tier-c { background: var(--warn-bg);    color: var(--warn-text);    border: 1px solid var(--warn-border); }

/* ── 17. PROGRESS ROWS ── */
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

.prog-row-label {
  font-size: 13px;
  color: var(--text-secondary);
  width: 170px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.prog-row-val {
  font-size: 12px;
  color: var(--text-secondary);
  width: 140px;
  text-align: right;
  flex-shrink: 0;
  font-family: var(--font-mono);
}

/* ── 18. MODAL ── */
#modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(2px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-md);
}

#modal-bg.hidden { display: none; }

.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: 4px solid var(--primary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  position: relative;
}

.modal-box h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: var(--space-lg);
  color: var(--primary);
}

.modal-box label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
  margin-bottom: var(--space-xs);
  margin-top: var(--space-md);
}

.modal-box label:first-of-type { margin-top: 0; }

.modal-box input,
.modal-box select,
.modal-box textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-primary);
  background: var(--bg-card);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.modal-box input::placeholder,
.modal-box textarea::placeholder { color: var(--text-tertiary); }

.modal-box input:focus,
.modal-box select:focus,
.modal-box textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

.modal-box textarea { height: 72px; resize: vertical; }

.modal-footer {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-lg);
  justify-content: flex-end;
  padding-top: var(--space-md);
  border-top: 1px solid var(--border);
}

.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
.modal-grid label,
.modal-grid input,
.modal-grid select,
.modal-grid textarea { grid-column: span 2; }
.modal-grid .half-label { grid-column: span 1; }
.modal-grid .half-field { grid-column: span 1; }

/* ── 19. ALERTS ── */
.alert {
  font-size: 13px;

//LOGIN / LOGOUT
async function handleUserSession(user){
  document.getElementById('auth-loading').style.display='none';

  if(!user){

    currentUser = null;
    currentCoeId = null;
    currentUserData = null;

    if(unsubscribeDB){
      unsubscribeDB();
      unsubscribeDB = null;
    }

    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('auth-loading').style.display='none';

    return;
  }

  try{

    const doc = await firebase.firestore()
      .collection("users")
      .doc(user.email)
      .get();

    if(!doc.exists){

      console.error("User profile not found");
      return;
    }

    const data = doc.data();

    currentUserData = data;
    currentUser = user.email;

    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';

    const badge = document.getElementById('tb-badge');

    if(data.role === 'admin'){

      document.getElementById('tb-title').textContent =
        'TEXMiN Foundation ⛏ CoE Dashboard';

      badge.className='tb-badge badge-admin';
      badge.textContent='ADMIN';

      document.getElementById('tb-user').textContent =
        data.name || user.email;


      renderAdmin();

    } else {

      const coe = COE_LIST.find(c => c.id === data.coeId);

      currentCoeId = data.coeId;

      document.getElementById('tb-title').textContent = `${coe.name} • ${coe.region}`;

      document.getElementById('tb-user').textContent = data.name || user.email;

      await loadFirestoreDB(data.coeId);

      if(unsubscribeDB){
        unsubscribeDB();
      }

      unsubscribeDB = listenFirestoreDB(data.coeId);

      renderCOE(data.coeId);
    }

  } catch(e){

    console.error("Session Restore Error:", e);
  }
}

async function doLogin(){

  const loginBtn = document.querySelector('.btn-login');

  // show loading state
  loginBtn.disabled = true;
  loginBtn.innerHTML = 'Signing In...';
  loginBtn.style.opacity = '0.7';
  loginBtn.style.cursor = 'not-allowed';

  const email = document.getElementById('inp-id').value.trim();
  const password = document.getElementById('inp-pw').value.trim();
  const err = document.getElementById('login-err');

  err.style.display = 'none';

  try{

    const userCredential = await firebase.auth()
      .signInWithEmailAndPassword(email, password);

    const user = userCredential.user;

    await handleUserSession(user);

  } catch(e){

    console.error(e);

    err.style.display='block';
    err.textContent = e.message;

  } finally {

    loginBtn.disabled = false;

    loginBtn.innerHTML = 'Sign In →';

    loginBtn.style.opacity = '1';

    loginBtn.style.cursor = 'pointer';
  }
}

async function doLogout(){

  await firebase.auth().signOut();

function adminTab(t,el){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const c = document.getElementById('main-content');
  if(t==='overview')  c.innerHTML = adminOverview();
  else if(t==='all-pi')  c.innerHTML = adminAllPI();
  else if(t==='all-td')  c.innerHTML = adminAllTD();
  else if(t==='all-fw')  c.innerHTML = adminAllFW();
  else if(t==='all-log') c.innerHTML = adminAllLog();
  else if(t==='announcements') adminAnnouncements();
}

function adminCoEDetail(id){
  const coe = COE_LIST.find(c=>c.id===id);

  const tierCls = {A:'tier-a',B:'tier-b',C:'tier-c'}[coe.tier];
  let html=`<h3>${coe.name}</h3><span class="coe-tier ${tierCls}">Tier ${coe.tier}</span>`;
  // Pre-Incubation
  html+=`<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:16px 0 8px">Pre-Incubation (${d.preInc.length}/${coe.piMax})</div>`;
  if(!d.preInc.length){html+=`<div style="font-size:13px;color:var(--text-tertiary);margin-bottom:6px">No entries yet</div>`;}
  else d.preInc.forEach(e=>{
    html+=`<div class="entry-row">

        <div class="entry-name">${esc(e.name)}</div>

  html+=`<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:16px 0 8px">Tech Development (${d.techDev.length}/${coe.tdMax})</div>`;
  if(!d.techDev.length){html+=`<div style="font-size:13px;color:var(--text-tertiary);margin-bottom:6px">No entries yet</div>`;}
  else d.techDev.forEach(e=>{
    html+=`<div class="entry-row">
      <div class="av av-p">${ini(e.name)}</div>
      <div class="entry-info">
        <div class="entry-name">${esc(e.name)}</div>
        <div class="entry-sub">${esc(e.areaOfWork||'—')} · <span class="trl-badge">${e.trl||'TRL ?'}</span> · <span class="pill ${pCls(e.status)}">${e.status}</span></div>

      <div class="av av-s">${ini(e.name)}</div>
      <div class="entry-info">
        <div class="entry-name">${esc(e.name)}</div>
        <div class="entry-sub">${esc(e.dept||'—')} · <span class="pill ${pCls(e.status)}">${e.status}</span></div>
      </div>
      <div class="entry-amt">₹10,000</div>
    </div>`;
  });
  // Recent log
  if(d.updates && d.updates.length){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:16px 0 8px">Progress log (${d.updates.length} entries)</div>`;
    d.updates.slice().reverse().slice(0,5).forEach(u=>{
      html+=`<div class="log-entry"><div class="log-meta"><strong>${u.date}</strong> <span class="log-cat">${esc(u.category||'General')}</span></div><div class="log-text">${esc(u.text)}</div></div>`;
    });
  }
  // Show Center-In-Charge details if available
  if(d.cic && (d.cic.name || d.cic.contact || d.cic.email)){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin:16px 0 8px">Center-In-Charge</div>`;
    html+=`<div class="section-card" style="margin-bottom:8px">`;
    if(d.cic.name)    html+=`<div class="detail-field"><div class="df-label">Name</div><div class="df-value">${esc(d.cic.name)}</div></div>`;
    if(d.cic.contact) html+=`<div class="detail-field"><div class="df-label">Contact</div><div class="df-value">${esc(d.cic.contact)}</div></div>`;
    if(d.cic.email)   html+=`<div class="detail-field"><div class="df-label">Email</div><div class="df-value">${esc(d.cic.email)}</div></div>`;
    html+=`</div>`;
  }
  html+=`<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Close</button></div>`;
  openModal(html);
}

function postAnnouncement(){

  const msg =
    document.getElementById('ann-msg').value.trim();

  if(!msg){
    alert("Enter announcement");
    return;
  }

  const selected =
    [...document.querySelectorAll('.ann-coe:checked')]
      .map(e=>e.value);

  if(selected.length===0){
    alert("Select at least one CoE");
    return;
  }

  selected.forEach(id=>{

    const d = getDB(id);

    if(!d.announcements)
      d.announcements=[];
      if(!d.unreadAnnouncements)
  d.unreadAnnouncements=0;

d.unreadAnnouncements++;

    d.announcements.unshift({
      text: msg,
      date: new Date().toLocaleString()
    });
  });

  saveAll();

  alert("Announcement posted successfully");

  adminAnnouncements();
}

function savePI(id){

teamMembers=v('m-team-members'),
year=v('m-year'),

    <label>Achievements</label><textarea id="m-achievements">${esc(e.achievements||'')}</textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Money Given</label><input id="m-given" type="number" min="0" max="1500000" value="${e.moneyGiven||0}"></div>
      <div><label>Money Utilized</label><input id="m-utilized" type="number" min="0" value="${e.moneyUtilized||0}"></div>
    </div>
    <div><label>Money Remaining (auto-calculated)</label><input value="${fmt((e.moneyGiven||0)-(e.moneyUtilized||0))}" readonly class="readonly-field"></div>
    <label>Progress Report</label><textarea id="m-progress-report">${esc(e.progressReport||'')}</textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Progress (%)</label><input id="m-prog" type="number" min="0" max="100" value="${e.progress||0}"></div>
      <div><label>Status</label><select id="m-status">${['Active','Pending','Completed','Inactive'].map(s=>`<option${s===e.status?' selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="updTD('${id}',${i})">Update</button>
    </div>`);
}

function updTD(id,i){
  if(!confirm('Update this tech development entry?')) return;
  const name=v('m-name'), team=v('m-team'), proj=v('m-proj'), year=v('m-year');
  const area=v('m-area'), trl=v('m-trl'), milestones=v('m-milestones'), achievements=v('m-achievements');
  const given=parseInt(v('m-given')||0), utilized=parseInt(v('m-utilized')||0);
  const progressReport=v('m-progress-report'), prog=Math.min(100,parseInt(v('m-prog')||0)), status=v('m-status');
  if(!name.trim()){ alert('Name is required.'); return; }
  if(isNaN(given)||given<=0){ alert('Amount must be > 0.'); return; }
  if(given>TD_MAX_PER){ alert('Max ₹15 Lakh.'); return; }
  Object.assign(getDB(id).techDev[i],{name,teamMembers:team,project:proj,yearOfGrant:year,areaOfWork:area,trl,milestones,achievements,moneyGiven:given,moneyUtilized:utilized,progressReport,progress:prog,status});
  saveAll(); closeModal(); coeTab('td',id,getActiveTab());
}

//FELLOWSHIPS
function coeFW(id){

  if(!d.fellows.length){ html+=`<div class="empty"><div class="empty-icon">🎓</div>No fellows added yet.</div>`; return html; }
  html+=`<div class="table-wrap"><table class="ftable"><colgroup><col style="width:19%"><col style="width:17%"><col style="width:17%"><col style="width:13%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:7%"></colgroup>`;
  html+=`<tr><th>Student Name</th><th>Department</th><th>Guiding Professor</th><th>Area of Work</th><th>Given</th><th>Utilized</th><th>Status</th><th></th></tr>`;
  d.fellows.forEach((e,i)=>{
    const util=e.moneyUtilized||0, rem=FW_FIXED-util;
    html+=`<tr>
      <td title="${esc(e.name)}">${esc(e.name)}</td>
      <td>${esc(e.dept||'—')}</td>
      <td>${esc(e.guidingProf||'—')}</td>
      <td title="${esc(e.areaOfWork||'')}">${esc(e.areaOfWork||'—')}</td>
      <td style="font-family:'DM Mono',monospace">₹10,000</td>

//PROGRESS LOG
function coeLog(id){
  const d=getDB(id);
  let html=`<div class="sec-head"><span class="sec-head-title">Progress Log</span><button class="btn-add" onclick="addLog('${id}')">+ Add Update</button></div>`;
  if(!d.updates||!d.updates.length){ html+=`<div class="empty"><div class="empty-icon">📝</div>No updates yet. Add your first progress entry.</div>`; return html; }
  html+=`<div class="section-card">`;
  d.updates.slice().reverse().forEach(u=>{
    html+=`<div class="log-entry"><div class="log-meta"><strong>${esc(u.date)}</strong> <span class="log-cat">${esc(u.category||'General')}</span></div><div class="log-text">${esc(u.text)}</div></div>`;
  });
  html+=`</div>`;
  return html;
}

function addLog(id){
  openModal(`<h3>Add Progress Update</h3>
    <label>Date</label><input id="m-date" type="date" value="${today()}">
    <label>Category</label>
    <select id="m-cat">
      <option>General</option><option>Pre-Incubation</option><option>Tech Development</option>
      <option>Fellowship</option><option>Milestone</option><option>Issue / Risk</option><option>Event</option>
    </select>
    <label>Update Details *</label><textarea id="m-text" placeholder="Describe the progress, milestone, or issue..." style="height:100px"></textarea>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveLog('${id}')">Save</button></div>`);
}

function saveLog(id){
  const date=v('m-date'), category=v('m-cat'), text=v('m-text');
  if(!text.trim()){ alert('Please enter update details.'); return; }
  const d=getDB(id);
  if(!d.updates) d.updates=[];
  d.updates.push({date,category,text});
  saveAll(); closeModal(); coeTab('log',id,getActiveTab());
}


// CENTER-IN-CHARGE
function coeCIC(id){
  const d = getDB(id);
  if(!d.cic) d.cic = {name:'', contact:'', email:''};
  const c = d.cic;
  return `
    <div class="sec-head">
      <span class="sec-head-title">Details of Center-In-Charge</span>
    </div>
    <div class="section-card" style="max-width:540px">
      <div class="field-group">
        <label>Name</label>
        <input id="cic-name" type="text" placeholder="Full name of Center-In-Charge" value="${esc(c.name||'')}">
      </div>
      <div class="field-group">
        <label>Contact Number</label>
        <input id="cic-contact" type="tel" placeholder="10-digit mobile number" value="${esc(c.contact||'')}" 
          oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)">
      </div>
      <div class="field-group">
        <label>Email ID</label>
        <input id="cic-email" type="email" placeholder="Official email address" value="${esc(c.email||'')}">
      </div>
      <div style="margin-top:1.25rem">
        <button class="btn-save" onclick="saveCIC('${id}')">Save Details</button>
        <span id="cic-msg" style="margin-left:12px;font-size:13px;color:#166534;display:none;">✓ Saved successfully</span>
      </div>
    </div>`;
}

function saveCIC(id){
  const name    = document.getElementById('cic-name').value.trim();
  const contact = document.getElementById('cic-contact').value.trim();
  const email   = document.getElementById('cic-email').value.trim();
  if(!name){ alert('Name is required.'); return; }
  if(contact && !/^[0-9]{10}$/.test(contact)){ alert('Contact number must be exactly 10 digits.'); return; }
  if(email && !/^[^@]+@[^@]+\.[^@]+$/.test(email)){ alert('Please enter a valid email address.'); return; }
  const d = getDB(id);
  d.cic = {name, contact, email};
  saveAll();
  const msg = document.getElementById('cic-msg');
  msg.style.display = 'inline';
  setTimeout(()=>{ msg.style.display='none'; }, 3000);
  // Refresh admin CoE cards if needed (data auto-reflects next time admin opens)
}
